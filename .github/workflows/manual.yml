# This is a basic workflow that is manually triggered

name: Manual workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Hello World action (casual)
        uses: ./.github/actions/hello-world
        with:
          who-to-greet: 'Nicholai'

      - name: Run Hello World action (formal)
        id: formal-greet
        uses: ./.github/actions/hello-world
        with:
          who-to-greet: 'Nicholai'
          greeting-style: 'formal'

      - name: Show output from action
        shell: bash
        run: echo "The formal greeting fired at ${{ steps.formal-greet.outputs.greeting-time }}"
